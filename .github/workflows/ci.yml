name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: translate
          POSTGRES_PASSWORD: translate
          POSTGRES_DB: translate_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U translate -d translate_ai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://translate:translate@localhost:5432/translate_ai?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Sync database schema
        run: npx prisma db push --accept-data-loss

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e
        env:
          MOCK_TRANSLATIONS: 'true'

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: translate
          POSTGRES_PASSWORD: translate
          POSTGRES_DB: translate_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U translate -d translate_ai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://translate:translate@localhost:5432/translate_ai?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      VITE_API_URL: http://localhost:3000/api/v1
      PLAYWRIGHT_BASE_URL: http://localhost:4173
      MOCK_TRANSLATIONS: 'true'
      CORS_ORIGIN: http://localhost:4173,http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare database
        working-directory: backend
        run: |
          npx prisma generate
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'
          npx prisma db push --accept-data-loss
          npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for e2e
        working-directory: frontend
        run: VITE_API_URL=$VITE_API_URL npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend, frontend-e2e]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: translate-ai-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: translate-ai-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
