services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: translate
      POSTGRES_PASSWORD: translate
      POSTGRES_DB: translate_ai
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U translate -d translate_ai']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/scripts/docker-entrypoint-api.sh"]
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: postgresql://translate:translate@postgres:5432/translate_ai?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/api/v1/health | grep -q ok',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run start:worker:prod
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: postgresql://translate:translate@postgres:5432/translate_ai?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env.docker
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: /api/v1
      VITE_PROXY_TARGET: http://api:3000
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v3.2.1
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:11.5.2
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  ollama_data:
